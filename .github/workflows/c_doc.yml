name: Claude Documentation

on:
  issue_comment:
    types: [created]

jobs:
  claude:
    concurrency:
      group: claude-docs-${{ github.event.issue.number }}
      cancel-in-progress: true

    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Only run for specific users
    if: |
      (
        github.event.issue.pull_request
      ) && (
        contains(github.event.comment.body, '@claude_doc')
      ) && (
        github.actor == 'devYaoYH' ||
        github.actor == 'carter-cochran'
      )

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          # This fetches the head of the PR that the comment was made on
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Run Claude Docs
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude_doc"
          custom_instructions: |
            You are a technical writer for an embedded systems / spacecraft software project.
            When triggered, read the PR diff carefully and produce two things as a single PR comment:

            ---

            ## 1. README Update Proposal

            Write a **complete, ready-to-paste README section** (or multiple sections) covering every
            user-visible change in this PR. Follow the style of the existing README exactly:
            - Use `##` and `###` headers
            - Use fenced code blocks for commands, file trees, and config snippets
            - Prefer prose + examples over bullet soup; bullets are fine for feature lists
            - Tone: direct, practical, mission-aware (this is flight software)

            For each change in the diff, decide:
            - **New feature / component** → write a full new section with purpose, usage, and examples
            - **Changed behavior or CLI** → write an updated version of the existing section
            - **Internal refactor with no user impact** → skip it

            Do NOT produce a diff. Write the section as it should appear in the final README,
            preceded by a short note like:
            > EXAMPLE: Add the following under `## Generating Log Data` in `web/visualizer/README.md`

            ---

            ## 2. Changelog Entry

            Write a changelog block in [Keep a Changelog](https://keepachangelog.com) format:
            - Sections: Added / Changed / Fixed (omit empty sections)
            - One line per item, include PR number and `@contributor` when available
            - Max 2 lines per bullet — be terse

            ---

            Output the README proposal first, then the changelog. No other commentary.
