name: C/C++ Build

on:
  push:
    paths:
      - "src/**"
      - "bzl/**"
      - "BUILD.bazel"
      - ".bazelrc"
      - ".github/workflows/*.yaml"
  pull_request:
    paths:
      - "src/**"
      - "bzl/**"
      - "BUILD.bazel"
      - ".bazelrc"
      - ".github/workflows/*.yaml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: PICUBED-FLIGHT
            config: picubed-flight
            artifact: "samwise-products-picubed-flight"
          - name: PICUBED-BRINGUP
            config: picubed-bringup
            artifact: "samwise-products-picubed-bringup"
          - name: PICUBED-DEBUG
            config: picubed-debug
            artifact: "samwise-products-picubed-debug"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Project
        run: ./configure.sh

      - name: Install Arm GNU Toolchain (arm-none-eabi-gcc)
        uses: carlosperate/arm-none-eabi-gcc-action@v1

      - name: Mount bazel cache
        uses: actions/cache@v4
        with:
          path: "~/.cache/bazel"
          key: bazel-${{ matrix.config }}-${{ hashFiles('.bazelrc', 'MODULE.bazel', 'bzl/**') }}
          restore-keys: |
            bazel-${{ matrix.config }}-
            bazel-

      - name: Build with Bazel
        run: |
          # Set commit hash for all builds
          echo "build --define=COMMIT_HASH=${{ github.sha }}" > .bazelrc.local

          if [ "${{ matrix.name }}" = "PICUBED-FLIGHT" ]; then
            # For flight builds, pass the HMAC PSK secret as a C define
            echo "build --copt=-DPACKET_HMAC_PSK='\"${{ secrets.PACKET_HMAC_PSK }}\"'" >> .bazelrc.local
          fi

          # Build the main binary
          bazel build :samwise --config=${{ matrix.config }}

      - name: Generate UF2 file
        run: |
          bazel build :samwise --config=${{ matrix.config }} \
            --aspects @pico-sdk//tools:uf2_aspect.bzl%pico_uf2_aspect \
            --output_groups=+pico_uf2_files

      - name: Archive Build Products
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            bazel-bin/samwise.uf2
            bazel-bin/samwise
