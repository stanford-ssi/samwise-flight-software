name: C/C++ Build

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "bzl/**"
      - "BUILD.bazel"
      - ".bazelrc"
      - ".github/workflows/*.yaml"
  pull_request:
    paths:
      - "src/**"
      - "bzl/**"
      - "BUILD.bazel"
      - ".bazelrc"
      - ".github/workflows/*.yaml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: PICUBED-FLIGHT
            config: picubed-flight
            artifact: "samwise-products-picubed-flight"
          - name: PICUBED-BRINGUP
            config: picubed-bringup
            artifact: "samwise-products-picubed-bringup"
          - name: PICUBED-DEBUG
            config: picubed-debug
            artifact: "samwise-products-picubed-debug"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          # Avoid downloading Bazel every time.
          bazelisk-cache: true
          # Store build cache per workflow.
          disk-cache: ${{ github.workflow }}
          # Share repository cache between workflows.
          repository-cache: true

      - name: Build with Bazel
        run: |
          # Set commit hash for all builds
          echo "build --define=COMMIT_HASH=${{ github.sha }}" > .bazelrc.local

          if [ "${{ matrix.name }}" = "PICUBED-FLIGHT" ]; then
            # For flight builds, pass the HMAC PSK secret as a C define
            echo "build --copt=-DPACKET_HMAC_PSK='\"${{ secrets.PACKET_HMAC_PSK }}\"'" >> .bazelrc.local
          fi

          # Build the main binary
          bazel build :samwise --config=${{ matrix.config }} --incompatible_enable_cc_toolchain_resolution

      - name: Check Binary Size
        if: ${{ matrix.name == "PICUBED-FLIGHT" }}
        run: |
          # Check if the .uf2 file exists
          if [ ! -f "bazel-bin/samwise.uf2" ]; then
            echo "❌ Error: samwise.uf2 file not found at bazel-bin/samwise.uf2"
            exit 1
          fi
          
          # Get file size in bytes
          FILESIZE=$(stat -c%s bazel-bin/samwise.uf2)
          MAX_SIZE=153600  # 150 KiB in bytes
          
          echo "📊 Binary size check for ${{ matrix.name }}:"
          echo "   File: bazel-bin/samwise.uf2"
          echo "   Size: ${FILESIZE} bytes ($(echo "scale=2; ${FILESIZE}/1024" | bc -l) KiB)"
          echo "   Limit: ${MAX_SIZE} bytes (150.00 KiB)"
          
          # Check if file size exceeds limit
          if [ ${FILESIZE} -gt ${MAX_SIZE} ]; then
            echo "❌ FAILURE: Binary size ${FILESIZE} bytes exceeds limit of ${MAX_SIZE} bytes!"
            echo "   Exceeds by: $((${FILESIZE} - ${MAX_SIZE})) bytes"
            exit 1
          else
            echo "✅ SUCCESS: Binary size is within limits"
            echo "   Remaining: $((${MAX_SIZE} - ${FILESIZE})) bytes available"
          fi

      - name: Archive Build Products
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            bazel-bin/samwise.uf2
            bazel-bin/samwise
